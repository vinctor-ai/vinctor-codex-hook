version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    ignore:
      # TypeScript 7 (the native-compiler line) currently breaks this build —
      # node types fail to resolve (hundreds of type errors). Adopt a major
      # TS deliberately, not via weekly bumps.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      # @types/node tracks the engines floor (node >=20), not the newest
      # node major.
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
